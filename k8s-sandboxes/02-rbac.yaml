apiVersion: v1
kind: ServiceAccount
metadata:
  name: kimi-sandbox-executor
  namespace: kimi-sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kimi-sandbox-role
  namespace: kimi-sandboxes
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames: ["gemini-api-key", "kimi-api-key", "github-token"]
  # Restricted to secrets explicitly labeled kimi-sandbox-accessible: "true"
  # in the kimi-sandboxes namespace. Production should enforce this via
  # admission controller or external secret operator.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kimi-sandbox-binding
  namespace: kimi-sandboxes
subjects:
- kind: ServiceAccount
  name: kimi-sandbox-executor
  namespace: kimi-sandboxes
roleRef:
  kind: Role
  name: kimi-sandbox-role
  apiGroup: rbac.authorization.k8s.io
