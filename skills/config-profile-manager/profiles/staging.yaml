version: "1.0"
description: >
  STAGING profile for sandbox-executor.
  Production-equivalent hardening in an isolated environment.
  Validates promotion candidates before production deployment.
  
_inherits: base.yaml
_environment: staging

sandbox:
  executor:
    # Fixed staging tags for reproducibility.
    image: sandbox-executor:staging
    image_pull_policy: IfNotPresent
    max_concurrent_jobs: 10
    default_timeout: 5m
    hot_reload: false

security:
  # Staging MUST mirror production security posture.
  # No capability additions beyond base (ALL dropped).
  capability_additions: []

  # Strict hardening.
  read_only_rootfs: true
  no_new_privileges: true

  # Image verification: mandatory in staging (same as prod).
  image_verification:
    verify_signatures: true
    required_signers:
      - staging-ci@sandbox.internal
      - release-engineering@sandbox.internal
    cosign_keyring: /etc/sandbox/cosign-staging.pub
    signature_retention: 30d

  # mTLS required (production-equivalent).
  network:
    client_auth_mode: require
    tls_version_min: "1.3"
    # Staging uses a dedicated internal CA.
    ca_cert_bundle: /etc/sandbox/certs/staging-ca.crt
    allowed_ciphers:
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_CHACHA20_POLY1305_SHA256

vault:
  # OBSIDIAN-001: Staging vault mount policy.
  # Isolated staging vault; no prod data access.
  obsidian:
    socket_path: /run/obsidian/vault-staging.sock
    mount_policy:
      mode: staging
      allow_mock_secrets: false
      allowed_paths:
        - "staging/*"
      require_approval: true
      approval_timeout: 15m
      audit_reads: true
      audit_writes: true
      max_ttl: 24h
      # Explicitly DENY any prod paths (isolation boundary).
      denied_paths:
        - "production/*"
        - "prod/*"
        - "*production*"

policy_engine:
  # Strict deny-by-default, identical to prod.
  endpoint: https://policy-staging.sandbox.internal:8443
  default_decision: deny
  decision_timeout: 2s
  cache_ttl: 30s
  # Require policy freshness checks.
  policy_bundle_refresh: 5m

observability:
  log_level: INFO
  tracing_enabled: true
  jaeger_endpoint: https://tracing-staging.sandbox.internal:9411
  # Forward logs to staging aggregation.
  log_forwarding:
    enabled: true
    endpoint: https://logs-staging.sandbox.internal:9200
    buffer_size: 1000

resource_limits:
  # Production-equivalent sizing.
  default:
    cpu_cores: 2.0
    memory_mb: 2048
    disk_mb: 4096
    ephemeral_storage_mb: 2048
    max_processes: 200

network:
  # Restricted egress with explicit allow-list (same model as prod).
  egress_policy: restricted
  allowed_egress_hosts:
    - "registry.staging.internal"
    - "policy-staging.sandbox.internal"
    - "vault-staging.sandbox.internal"
    - "logs-staging.sandbox.internal"
    - "tracing-staging.sandbox.internal"
    - "*.staging.internal"
  proxy_mode: true
  proxy_endpoint: http://proxy-staging.sandbox.internal:3128
  dns_resolver: "10.0.1.10"
