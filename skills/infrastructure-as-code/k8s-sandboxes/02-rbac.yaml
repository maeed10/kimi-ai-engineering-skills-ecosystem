apiVersion: v1
kind: ServiceAccount
metadata:
  name: kimi-sandbox-executor
  namespace: kimi-sandbox
  automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kimi-sandbox-provisioner
  namespace: kimi-sandbox
  automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kimi-sandbox-role
  namespace: kimi-sandbox
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames: ["gemini-api-key", "kimi-api-key", "github-token"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kimi-sandbox-provisioner-role
  namespace: kimi-sandbox
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "delete", "get", "list"]
  # Restricted to secrets labeled kimi-sandbox-accessible: "true"
  # The provisioner (host daemon) creates short-lived secrets;
  # the executor (in-sandbox SA) only reads them.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kimi-sandbox-binding
  namespace: kimi-sandbox
subjects:
- kind: ServiceAccount
  name: kimi-sandbox-executor
  namespace: kimi-sandbox
roleRef:
  kind: Role
  name: kimi-sandbox-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kimi-sandbox-provisioner-binding
  namespace: kimi-sandbox
subjects:
- kind: ServiceAccount
  name: kimi-sandbox-provisioner
  namespace: kimi-sandbox
roleRef:
  kind: Role
  name: kimi-sandbox-provisioner-role
  apiGroup: rbac.authorization.k8s.io
