---
skill_name: security-auditor
version: 4.0.0

runtime:
  image: python:3.11-slim
  expected_sha256: null
  entrypoint: null

capabilities:
  network:
    enabled: true
    whitelisted_domains:
      - api.osv.dev
      - api.github.com
      - semgrep.dev
      - pypi.org
      - registry.npmjs.org

  filesystem:
    read_only_mounts:
      - host: "{REPO_ROOT}"
        container: "/workspace"
    write_paths:
      - "/tmp"
      - "/workspace/.security-auditor"
    max_tmpfs_size: "512m"

  resources:
    profile: heavy
    max_memory_mb: 4096
    max_cpus: 2.0
    max_pids: 128
    timeout_seconds: 600

  security:
    privileged: false
    seccomp_profile: "default"
    capabilities_drop: ["ALL"]
    capabilities_add: []
    no_new_privileges: true

audit:
  log_level: INFO
  retain_stdout: true
  retain_stderr: true
  max_log_size_mb: 10
  forward_to_policy_engine: true
